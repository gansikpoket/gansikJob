<!DOCTYPE html>
<html>
  <body>
    <h1>검색 결과</h1>
    <table>
      <tr>
        <th>포지션</th>
        <th>회사명</th>
        <th>상세정보</th>
        <th>링크</th>
      </tr>
      {% for job in jobs %}
      <tr>
        <td>{{ job.title }}</td>
        <td>{{ job.company_name }}</td>
        <td>{{ job.description }}</td>
        <td><a href="{{ job.link }}">지원하기</a></td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
